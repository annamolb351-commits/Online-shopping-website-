<!DOCTYPE html>
<html>
<head>
<title>Fashion Store</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f5f5f5;
}

header{
    background:#2874f0;
    color:white;
    padding:15px;
    text-align:center;
}

.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    margin:20px;
}

.card{
    background:white;
    width:220px;
    margin:15px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
    text-align:center;
}

.card img{
    width:100%;
    height:150px;
}

button{
    background:#fb641b;
    color:white;
    border:none;
    padding:10px;
    width:100%;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#e65a17;
}

#cart{
    text-align:center;
    font-size:18px;
    margin:10px;
}

.delivery{
    font-size:12px;
    color:green;
}
</style>

</head>

<body>

<header>
<h1>🛍 Fashion Store</h1>
<p>Flipkart Style Mini Project</p>
</header>

<div id="cart">
🛒 Cart Items: <span id="count">0</span>
</div>

<div class="products">

    <div class="card">
        <img src="https://via.placeholder.com/200x150">
        <h3>Red Dress</h3>
        <p>₹799</p>
        <p class="delivery" id="d1"></p>
        <button onclick="addCart('d1')">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200x150">
        <h3>Blue Gown</h3>
        <p>₹999</p>
        <p class="delivery" id="d2"></p>
        <button onclick="addCart('d2')">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200x150">
        <h3>Casual Wear</h3>
        <p>₹599</p>
        <p class="delivery" id="d3"></p>
        <button onclick="addCart('d3')">Add to Cart</button>
    </div>

</div>

<script>

let count = 0;

// delivery date generator
function getDelivery(){
    let d = new Date();
    d.setDate(d.getDate()+3);
    return d.toDateString();
}

// set delivery dates
document.getElementById("d1").innerText = "Delivery: " + getDelivery();
document.getElementById("d2").innerText = "Delivery: " + getDelivery();
document.getElementById("d3").innerText = "Delivery: " + getDelivery();

function addCart(id){
    count++;
    document.getElementById("count").innerText = count;
    alert("Item added to cart!");
}

</script>

</body>
</html>
